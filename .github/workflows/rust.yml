name: Rust CI

# This workflow checks the `logic` crate only (`logic/`) — the pure,
# hardware-free calendar/prayer-time logic split out of the firmware so it
# can be built, linted, and tested with a normal stable host Rust toolchain,
# no ESP32 device or `esp` toolchain/ESP-IDF SDK required.
#
# The `namaz-vakti` firmware package at the repo root can only be built with
# the espup-installed `esp` toolchain + ESP-IDF SDK; that's covered by
# esp32-build.yml instead. See issue #2.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Cargo check (logic crate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: logic
      
      - name: Run cargo check
        working-directory: logic
        run: |
          cargo check --target "$(rustc -vV | sed -n 's/host: //p')" --verbose

  fmt:
    name: Rustfmt (logic crate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt
      
      - name: Run cargo fmt
        working-directory: logic
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (logic crate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: logic
      
      - name: Run clippy
        working-directory: logic
        run: |
          cargo clippy --target "$(rustc -vV | sed -n 's/host: //p')" --all-targets --all-features -- -D warnings

  test:
    name: Tests (logic crate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: logic
      
      - name: Run tests
        working-directory: logic
        run: |
          cargo test --target "$(rustc -vV | sed -n 's/host: //p')" --verbose

  doc:
    name: Documentation (logic crate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: logic
      
      - name: Check documentation
        working-directory: logic
        run: |
          cargo doc --target "$(rustc -vV | sed -n 's/host: //p')" --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  build:
    name: Build (logic crate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: logic
      
      - name: Run cargo build
        working-directory: logic
        run: |
          cargo build --release --target "$(rustc -vV | sed -n 's/host: //p')" --verbose
